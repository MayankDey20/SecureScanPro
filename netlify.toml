[build]
  base = "frontend"
  command = "npm install --legacy-peer-deps && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  SECRETS_SCAN_ENABLED = "false"

# Proxy API requests to Railway backend.
# Replace YOUR_RAILWAY_URL with your actual Railway domain
# (e.g., securescanpro-production.up.railway.app)
[[redirects]]
  from = "/api/*"
  to = "https://web-production-2dab0.up.railway.app/api/:splat"
  status = 200
  force = true
  headers = {X-From = "Netlify"}

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[dev]
  command = "npm run dev"
  port = 3000
  targetPort = 3000
  framework = "#custom"
