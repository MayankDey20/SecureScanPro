<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" shape-rendering="crispEdges">
  <!-- Shield body – pixel art style using grid squares -->
  <!-- Outer shield silhouette -->
  <rect x="6"  y="2"  width="20" height="2"  fill="#3b82f6"/>
  <rect x="4"  y="4"  width="24" height="2"  fill="#3b82f6"/>
  <rect x="4"  y="6"  width="24" height="2"  fill="#60a5fa"/>
  <rect x="4"  y="8"  width="24" height="2"  fill="#3b82f6"/>
  <rect x="4"  y="10" width="24" height="2"  fill="#3b82f6"/>
  <rect x="4"  y="12" width="24" height="2"  fill="#3b82f6"/>
  <rect x="4"  y="14" width="24" height="2"  fill="#3b82f6"/>
  <rect x="6"  y="16" width="20" height="2"  fill="#3b82f6"/>
  <rect x="8"  y="18" width="16" height="2"  fill="#3b82f6"/>
  <rect x="10" y="20" width="12" height="2"  fill="#3b82f6"/>
  <rect x="12" y="22" width="8"  height="2"  fill="#3b82f6"/>
  <rect x="14" y="24" width="4"  height="2"  fill="#3b82f6"/>
  <rect x="15" y="26" width="2"  height="2"  fill="#3b82f6"/>

  <!-- Lock icon inside shield (pixel keyhole) -->
  <!-- Lock body -->
  <rect x="12" y="14" width="8"  height="6"  fill="#1e3a5f"/>
  <rect x="11" y="15" width="10" height="4"  fill="#1e3a5f"/>
  <!-- Lock shackle arch -->
  <rect x="13" y="9"  width="2"  height="2"  fill="#93c5fd"/>
  <rect x="17" y="9"  width="2"  height="2"  fill="#93c5fd"/>
  <rect x="12" y="10" width="2"  height="4"  fill="#93c5fd"/>
  <rect x="18" y="10" width="2"  height="4"  fill="#93c5fd"/>
  <rect x="14" y="8"  width="4"  height="2"  fill="#93c5fd"/>
  <!-- Keyhole -->
  <rect x="15" y="15" width="2"  height="2"  fill="#3b82f6"/>
  <rect x="14" y="17" width="4"  height="2"  fill="#3b82f6"/>

  <!-- Top highlight pixel row for 3D coin feel -->
  <rect x="6"  y="2"  width="20" height="2"  fill="#93c5fd" opacity="0.5"/>
  <rect x="4"  y="4"  width="2"  height="4"  fill="#93c5fd" opacity="0.4"/>
  <rect x="26" y="4"  width="2"  height="4"  fill="#1e40af" opacity="0.5"/>

  <!-- Glow outline (outer border) -->
  <rect x="6"  y="1"  width="20" height="1"  fill="#93c5fd" opacity="0.6"/>
  <rect x="4"  y="3"  width="1"  height="14" fill="#93c5fd" opacity="0.4"/>
  <rect x="27" y="3"  width="1"  height="14" fill="#1e40af" opacity="0.4"/>
</svg>
